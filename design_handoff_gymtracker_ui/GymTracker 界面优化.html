<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GymTracker · 界面优化</title>
<link rel="stylesheet" href="gymtracker.css" />
<style>
  :root { --canvas:#E6E5E0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:
      radial-gradient(140% 100% at 50% -10%, #EFEEE9, #E0DFD9 70%);
    min-height:100vh; font-family:'Manrope',-apple-system,'PingFang SC',sans-serif;
    color:#1B1A16; padding:0 0 80px;
  }
  body.dark-canvas { background: radial-gradient(140% 100% at 50% -10%, #1a1a18, #0c0c0b 70%); color:#EDEBE3; }

  /* control bar */
  .toolbar {
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
    padding:18px 28px;
    background:color-mix(in srgb, #F1F0EC 78%, transparent);
    -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(0,0,0,.06);
  }
  body.dark-canvas .toolbar { background:color-mix(in srgb,#121211 78%, transparent); border-bottom-color:rgba(255,255,255,.07); }
  .tb-brand { display:flex; align-items:center; gap:12px; margin-right:auto; }
  .tb-logo { width:38px; height:38px; border-radius:11px; background:#0E9F6E; display:grid; place-items:center; color:#fff; }
  .tb-brand h1 { font-size:16px; font-weight:800; letter-spacing:-.3px; }
  .tb-brand p { font-size:12px; opacity:.6; margin-top:1px; }
  .tb-group { display:flex; align-items:center; gap:10px; }
  .tb-group > label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; opacity:.5; }
  .swatches { display:flex; gap:8px; }
  .sw {
    width:30px; height:30px; border-radius:9px; cursor:pointer; border:2px solid transparent;
    position:relative; transition:transform .12s;
  }
  .sw:hover { transform:translateY(-2px); }
  .sw.on { border-color:currentColor; box-shadow:0 0 0 2px #fff inset; }
  body.dark-canvas .sw.on { box-shadow:0 0 0 2px #111 inset; }
  .sw[data-s="emerald"]{ background:#0E9F6E; }
  .sw[data-s="blue"]{ background:#1F77D6; }
  .sw[data-s="indigo"]{ background:#5145D6; }
  .sw[data-s="coral"]{ background:#E0552B; }
  .sw[data-s="pink"]{ background:#D6418A; }
  .sw[data-s="graphite"]{ background:#3A382F; }
  .mode-toggle { display:flex; background:rgba(0,0,0,.06); border-radius:10px; padding:3px; }
  body.dark-canvas .mode-toggle { background:rgba(255,255,255,.08); }
  .mode-toggle button {
    border:none; background:transparent; cursor:pointer; padding:7px 14px; border-radius:8px;
    font-family:inherit; font-weight:700; font-size:13px; color:inherit; opacity:.55; display:flex; align-items:center; gap:6px;
  }
  .mode-toggle button.on { background:#fff; opacity:1; box-shadow:0 1px 3px rgba(0,0,0,.12); }
  body.dark-canvas .mode-toggle button.on { background:#2a2a26; }
  .icon-toggle button { width:40px; height:34px; padding:0; display:grid; place-items:center; }

  /* gallery */
  .gallery {
    display:flex; flex-wrap:wrap; gap:30px 48px; justify-content:center;
    padding:44px 32px 0; align-items:flex-start;
  }
  .slot { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .slot-label { text-align:center; }
  .slot-label .n { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; opacity:.4; }
  .slot-label .t { font-size:15px; font-weight:700; margin-top:2px; }
  .intro { max-width:680px; margin:34px auto 0; padding:0 28px; text-align:center; }
  .intro h2 { font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; opacity:.45; }
  .intro p { font-size:14.5px; line-height:1.6; opacity:.7; margin-top:10px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-brand">
    <div class="tb-logo" id="tbLogo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6.5 6.5l11 11M4 9l-1.5 1.5a2 2 0 0 0 0 3L8 19a2 2 0 0 0 3 0l1.5-1.5M15 6l1.5-1.5a2 2 0 0 1 3 0L22 7a2 2 0 0 1 0 3L20.5 11.5"/></svg>
    </div>
    <div>
      <h1>GymTracker · 界面优化</h1>
      <p>Precision Instrument — 视觉升级，结构功能不变</p>
    </div>
  </div>

  <div class="tb-group">
    <label>配色</label>
    <div class="swatches" id="swatches">
      <div class="sw on" data-s="emerald" title="翠绿"></div>
      <div class="sw" data-s="blue" title="海蓝"></div>
      <div class="sw" data-s="indigo" title="靛蓝"></div>
      <div class="sw" data-s="coral" title="珊瑚"></div>
      <div class="sw" data-s="pink" title="玫粉"></div>
      <div class="sw" data-s="graphite" title="石墨"></div>
    </div>
  </div>

  <div class="tb-group">
    <label>数字</label>
    <div class="mode-toggle" id="numToggle">
      <button data-n="grotesk">Grotesk</button>
      <button data-n="mono">Mono</button>
      <button data-n="sora" class="on">Sora</button>
    </div>
  </div>

  <div class="tb-group">
    <div class="mode-toggle icon-toggle" id="modeToggle">
      <button data-m="light" class="on" title="明亮" aria-label="明亮">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.2v2.4M12 19.4v2.4M4.4 4.4 6.1 6.1M17.9 17.9l1.7 1.7M2.2 12h2.4M19.4 12h2.4M4.4 19.6 6.1 17.9M17.9 6.1l1.7-1.7"/></svg>
      </button>
      <button data-m="dark" title="深色" aria-label="深色">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 14.8A8.2 8.2 0 0 1 9.2 3.5 7.2 7.2 0 1 0 20.5 14.8Z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="intro">
  <h2>全部界面 · 8 屏</h2>
  <p>同一套「精密仪器」设计系统铺到了所有界面。点上方的配色色块与明/暗切换，所有界面实时换肤（「我的 · 外观」里也内置了供用户自选的配色方案）。结构、流程、文案表述均未改动。</p>
</div>

<div class="app" data-mode="light" data-scheme="emerald" data-num="sora" id="app">
  <div class="gallery" id="gallery"></div>
</div>

<script src="screens.js"></script>
<script>
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = [
    slot('01','登录 · Auth', SCREENS.auth),
    slot('02','记录 · 我的健身房', SCREENS.home),
    slot('03','器械列表 · Gym', SCREENS.gym),
    slot('04','器械详情 · Machine', SCREENS.machine),
    slot('05','分类 · Categories', SCREENS.catList),
    slot('06','分类详情 · Category', SCREENS.category),
    slot('07','日历 · Calendar', SCREENS.calendar),
    slot('08','我的 · Profile', SCREENS.profile),
    sect('交互态 · Modals & Overlays'),
    slot('09','历史最佳奖杯 · Trophy', SCREENS.machine + MODALS.trophy),
    slot('10','重量选择器 · Picker', SCREENS.machine + MODALS.picker),
    slot('11','编辑记录 · Bottom Sheet', SCREENS.machine + MODALS.edit),
    slot('12','分类添加器械 · Two-step', SCREENS.category + MODALS.catAdd),
  ].join('');

  function sect(t){
    return `<div style="flex-basis:100%; text-align:center; margin:30px 0 -2px;">
      <span style="font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; opacity:.4;">${t}</span>
    </div>`;
  }

  function slot(n, title, inner){
    return `<div class="slot">
      <div class="frame"><div class="screen">
        <div class="island"></div>
        ${statusBar()}
        ${inner}
        <div class="home-ind"></div>
      </div></div>
      <div class="slot-label"><div class="n">${n}</div><div class="t">${title}</div></div>
    </div>`;
  }

  // ---- unified theme application ----
  const app = document.getElementById('app');
  function syncControls(){
    const m = app.dataset.mode, s = app.dataset.scheme;
    document.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on', x.dataset.s===s));
    document.querySelectorAll('#modeToggle button').forEach(x=>x.classList.toggle('on', x.dataset.m===m));
    document.querySelectorAll('.scheme-dot').forEach(x=>x.classList.toggle('on', x.dataset.c===s));
    document.querySelectorAll('.seg button').forEach(x=>{
      const isLight = x.textContent.trim()==='明亮';
      x.classList.toggle('on', (isLight && m==='light') || (!isLight && m==='dark'));
    });
    document.querySelectorAll('#numToggle button').forEach(x=>x.classList.toggle('on', x.dataset.n===app.dataset.num));
    document.body.classList.toggle('dark-canvas', m==='dark');
    document.getElementById('tbLogo').style.background = getComputedStyle(app).getPropertyValue('--accent');
  }
  function setScheme(s){ app.dataset.scheme = s; syncControls(); }
  function setMode(m){ app.dataset.mode = m; syncControls(); }
  function setNum(n){ app.dataset.num = n; syncControls(); }

  // top toolbar
  document.getElementById('swatches').addEventListener('click', e => {
    const sw = e.target.closest('.sw'); if(sw) setScheme(sw.dataset.s);
  });
  document.getElementById('modeToggle').addEventListener('click', e => {
    const b = e.target.closest('button'); if(b) setMode(b.dataset.m);
  });
  document.getElementById('numToggle').addEventListener('click', e => {
    const b = e.target.closest('button'); if(b) setNum(b.dataset.n);
  });
  // in-screen profile controls
  app.addEventListener('click', e => {
    const dot = e.target.closest('.scheme-dot'); if(dot){ setScheme(dot.dataset.c); return; }
    const seg = e.target.closest('.seg button'); if(seg){ setMode(seg.textContent.trim()==='明亮'?'light':'dark'); }
  });
  syncControls();
</script>
</body>
</html>
